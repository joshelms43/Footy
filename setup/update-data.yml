# =============================================================
# FootyLab data factory — v0.1.0
# -------------------------------------------------------------
# COPY THIS FILE TO:  .github/workflows/update-data.yml
# (GitHub web: Add file -> Create new file -> paste that path)
#
# Before first run, add a repository secret:
#   Settings -> Secrets and variables -> Actions -> New secret
#   Name:  SQUIGGLE_CONTACT
#   Value: FootyLab (github.com/joshelms43/Footy) - your@email
#
# Then: Actions tab -> "Update data" -> Run workflow.
# First run backfills everything (~5 min); after that it runs
# every Friday morning AEST and only refreshes the current season.
# =============================================================
name: Update data

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 20 * * 4'   # Thu 20:00 UTC = Fri ~6am AEST

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Games (Squiggle)
        env:
          CONTACT: ${{ secrets.SQUIGGLE_CONTACT }}
        run: node scripts/build-data.mjs

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Players (Fryzigg)
        run: |
          Rscript -e 'install.packages("jsonlite")'
          Rscript scripts/players-split.R

      - name: Commit data
        run: |
          git config user.name 'footylab-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%Y-%m-%d)"
          git push
